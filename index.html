<!DOCTYPE html>
<html>
<head>
    <title>Phishing URL Detector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .container {
            background: #fff;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        input[type=text] {
            width: 100%;
            padding: 12px 15px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #007BFF;
            color: #fff;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 25px;
            text-align: left;
            padding: 15px;
            border-radius: 8px;
            animation: fadeIn 0.5s ease;
        }
        .low { background-color: #d4edda; color: #155724; }
        .medium { background-color: #fff3cd; color: #856404; }
        .high { background-color: #f8d7da; color: #721c24; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stats {
            margin-top: 20px;
            font-size: 14px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Phishing URL Detector</h2>
        <form method="POST">
            <input type="text" name="url" placeholder="Enter URL" required value="{{ url }}">
            <button type="submit">Analyze</button>
        </form>

        {% if result %}
        <div class="result {% if result.startswith('Low') %}low{% elif result.startswith('Medium') %}medium{% else %}high{% endif %}">
            <h3>{{ result }}</h3>
            <ul>
                {% for reason in reasons %}
                <li>{{ reason }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}

        <div class="stats">
            <p>Total URLs analyzed: {{ stats.total }}</p>
            <p>Low Risk: {{ stats.low }} | Medium Risk: {{ stats.medium }} | High Risk: {{ stats.high }}</p>
        </div>
    </div>
</body>
</html>
